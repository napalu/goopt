name: Test Go Modules (v1 & v2)

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  test-v1:
    timeout-minutes: 15
    strategy:
      matrix:
        go-version: [1.18.x, stable]
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run Test & Coverage (v1)
        run: |
          go test -v ./... -race -timeout 10m -covermode=atomic -coverprofile=coverage_v1.out
        shell: bash

      - name: Validate Coverage File
        run: |
          test -f coverage_v1.out && echo "coverage_v1.out exists" || (echo "coverage_v1.out missing" && exit 1)
        shell: bash

      - name: Upload Coverage to Codecov (v1)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage_v1.out
          flags: v1
          name: codecov-v1-${{ matrix.os }}-${{ matrix.go-version }}
          fail_ci_if_error: false
          disable_search: true
          verbose: true
        continue-on-error: true

  test-v2:
    timeout-minutes: 15
    strategy:
      matrix:
        go-version: [1.23.x, stable]
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      # Use the matrix-installed Go; fail loudly if go.mod ever over-bumps the
      # directive instead of silently switching toolchains (which breaks coverage
      # with "no such tool covdata").
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run Test & Coverage (v2)
        run: |
          go test -v ./... -race -timeout 10m -covermode=atomic -coverprofile=coverage_v2.out
        working-directory: ./v2
        shell: bash

      - name: Validate Coverage File
        run: |
          test -f v2/coverage_v2.out && echo "coverage_v2.out exists" || (echo "coverage_v2.out missing" && exit 1)
        shell: bash

      - name: Upload Coverage to Codecov (v2)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: v2/coverage_v2.out
          flags: v2
          name: codecov-v2-${{ matrix.os }}-${{ matrix.go-version }}
          fail_ci_if_error: false
          disable_search: true
          verbose: true
        continue-on-error: true